<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Sentinel AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="loginsignup-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo"><i data-lucide="shield-check"></i> Sentinel</div>
            <h2>Create Account</h2>
            <p style="color: #94a3b8; margin-bottom: 20px;">Start protecting your images</p>
            
            <form id="signup-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-green" style="width: 100%;">Create Account</button>
            </form>
            
            <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Account created successfully! Redirecting to login...");
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
