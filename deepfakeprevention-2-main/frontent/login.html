<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Sentinel AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="loginsignup-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo"><i data-lucide="shield-check"></i> Sentinel </div>
            <h2>Welcome Back</h2>
            <p style="color: #94a3b8; margin-bottom: 20px;">Secure your identity</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-green" style="width: 100%;">Login to Dashboard</button>
            </form>
            
            <p class="auth-link">Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Redirect to your main index.html
            window.location.href = 'index.html'; 
        });
    </script>
</body>
</html>
